<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-page{display:flex;min-height:100vh;align-items:center;justify-content:center;background:var(--color-background);}
    .login-card{width:360px;background:var(--color-surface);padding:2rem;border-radius:0.75rem;box-shadow:var(--shadow-md)}
    .login-card h2{margin-bottom:1rem}
    .login-field{width:100%;padding:0.6rem;margin-bottom:0.75rem;border:1px solid var(--color-border);border-radius:0.5rem}
    .login-actions{display:flex;gap:0.5rem;justify-content:flex-end}
    .login-error{color:var(--color-error);display:none;margin-bottom:0.5rem}
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h2>Connexion au Dashboard</h2>
      <div class="login-error" id="loginError">Utilisateur ou mot de passe incorrect</div>
      <input id="loginUser" class="login-field" placeholder="Nom d'utilisateur" autocomplete="username">
      <input id="loginPass" class="login-field" type="password" placeholder="Mot de passe" autocomplete="current-password">
      <div class="login-actions">
        <button id="loginBtn" class="btn btn-primary">Se connecter</button>
      </div>
      
    </div>
  </div>

  <script>
    // Simple client-side auth for local dashboard
    const VALID_USER = 'Salim';
    const VALID_PASS = 'Nerox';

    document.getElementById('loginBtn').addEventListener('click', ()=>{
      const u = document.getElementById('loginUser').value.trim();
      const p = document.getElementById('loginPass').value;
      const err = document.getElementById('loginError');
      if(u === VALID_USER && p === VALID_PASS){
        localStorage.setItem('dashboardAuth', '1');
        window.location = 'index.html';
      } else {
        err.style.display = 'block';
      }
    });

    // If already authenticated, go to dashboard
    if(localStorage.getItem('dashboardAuth') === '1'){
      window.location = 'index.html';
    }
  </script>
</body>
</html>
